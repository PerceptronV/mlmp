run_name: study_v1
output_dir: outputs/analysis
rule_data_root: src/data/osf_gq2hj/analysis/data
device: cuda

# Transformer entries assume checkpoints exist under
# ``<checkpoint_dir>/<run_name>/checkpoint_latest.pt`` (or whichever ``ckpt`` selects).
# enum-only runs come from scripts/small-train.sh (no-rl-<mode>); enum+rl runs from
# scripts/train.sh (<mode>). CSV-only smoke runs can drop the transformer entries.
# TODO: update run_names to the actual run names you used.
methods:
  - { kind: transformer, name: tx_enum_in_weight, run_name: wild-dawn-50,     label: "In-Weight (Enum)",       mode: in-weight,             ckpt_select: latest, embedding_pool: mean, checkpoint_dir: ~/mlmp_checkpoints/no-rl-in-weight }
  - { kind: transformer, name: tx_enum_easy_shuf, run_name: revived-voice-51, label: "Symb-Shuffle (Enum)",    mode: easy-symbol-shuffling, ckpt_select: latest, embedding_pool: mean, checkpoint_dir: ~/mlmp_checkpoints/no-rl-easy-symbol-shuffling }
  - { kind: transformer, name: tx_enrl_in_weight, run_name: warm-dust-48,     label: "In-Weight (Enum+RL)",    mode: in-weight,             ckpt_select: latest, embedding_pool: mean, checkpoint_dir: ~/mlmp_checkpoints/in-weight }
  - { kind: transformer, name: tx_enrl_easy_shuf, run_name: sandy-puddle-49,  label: "Symb-Shuffle (Enum+RL)", mode: easy-symbol-shuffling, ckpt_select: latest, embedding_pool: mean, checkpoint_dir: ~/mlmp_checkpoints/easy-symbol-shuffling }
  - { kind: human,       name: humans, label: "Humans" }
  - { kind: mpl,         name: mpl,    label: "MPL",    filters: { lesion: 'None', mode: Online, steps: '500000' } }
  - { kind: fleet,       name: fleet,  label: "Fleet",  filters: { mode: Online, steps: '500000' } }

analyses:
  - kind: rule_acquisition
    pairs: all

  - kind: failure_modes
    features: [recursive, higher, conditional, arithmetic, mapping, filtering, indexing, unfolding, counting]
    pairs: [
      [tx_enum_in_weight, humans],
      [tx_enum_easy_shuf, humans],
      [tx_enrl_in_weight, humans],
      [tx_enrl_easy_shuf, humans],
      [tx_enum_in_weight, tx_enum_easy_shuf],
      [tx_enrl_in_weight, tx_enrl_easy_shuf],
      [tx_enum_in_weight, tx_enrl_in_weight],
      [tx_enum_easy_shuf, tx_enrl_easy_shuf]
    ]

  - kind: clustering
    methods: [tx_enum_in_weight, tx_enum_easy_shuf, tx_enrl_in_weight, tx_enrl_easy_shuf]
    reducer: [pca, tsne]
    cluster: kmeans
    k_search: [4, 5, 6, 7, 8, 9, 10]
    color_by: [cluster, recursive, mapping]
    replicates: false
    level: task

  - kind: error_similarity
