run_name: csv_only_smoke
output_dir: outputs/analysis
rule_data_root: src/data/osf_gq2hj/analysis/data

methods:
  - { kind: human,       name: humans,      label: "Humans" }
  - { kind: mpl,         name: mpl,         label: "MPL",       filters: { lesion: 'None', mode: Online, steps: '500000' } }
  - { kind: fleet,       name: fleet,       label: "Fleet",     filters: { mode: Online, steps: '500000' } }
  - { kind: codex,       name: codex_g,     label: "Codex (G)", filters: { source: codex_code_G } }
  - { kind: enumeration, name: enumeration, label: "Enumeration" }
  - { kind: metagol,     name: metagol,     label: "Metagol" }
  - { kind: robustfill,  name: robustfill,  label: "RobustFill" }

analyses:
  - kind: rule_acquisition
    pairs: all

  - kind: failure_modes
    features: [recursive, higher, conditional, arithmetic, mapping, filtering, indexing, unfolding, counting]
    pairs: [[humans, mpl], [humans, fleet], [mpl, fleet]]

  - kind: clustering
    methods: [humans, mpl, fleet]      # all skip — emits CapabilityMissing warnings, returns empty result

  - kind: error_similarity
