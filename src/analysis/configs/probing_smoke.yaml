run_name: csv_only_smoke
output_dir: outputs/analysis
rule_data_root: src/data/osf_gq2hj/analysis/data
device: cpu

# Smoke run: surface-feature baseline only (no transformer checkpoint required).
# Reuses the ``csv_only_smoke`` rule_acquisition output — its acquired.parquet
# has the rows ProbingAnalysis filters on. fast: n_perm=0, n_folds=2.
methods:
  - { kind: mpl_best, name: mpl_best, label: "MPL (Best)", filters: { lesion: 'None', mode: Online, steps: '500000' } }

analyses:
  - kind: probing
    methods: [mpl_best]
    mpl_method: mpl_best
    acquired_method: mpl
    primitives: [MemorizeAll, Memorize, AntiUnify, Recurse, Variable, Delete]
    n_folds: 2
    n_perm: 0
    label_aggregation: soft       # "soft" (BCE-against-y) or "majority"
    majority_threshold: 0.5       # also AUROC ground truth + CV stratification key
    surface_baseline: true
