run_name: study_v1
output_dir: outputs/analysis
rule_data_root: src/data/osf_gq2hj/analysis/data
device: cuda

# Transformer entries assume checkpoints exist under
# ``checkpoints/<run_name>/checkpoint_best_acc.pt`` (or whichever ``ckpt`` selects).
# CSV-only smoke runs can drop the transformer entries.
methods:
  - { kind: transformer, name: tx_in_weight, run_name: rl_iw_baseline, mode: in-weight,             ckpt_select: best_acc, embedding_pool: mean, corpus: datasets/corpus-a/rl_corpus.json }
  - { kind: transformer, name: tx_easy_shuf, run_name: rl_easy_shuf,   mode: easy-symbol-shuffling, ckpt_select: best_acc, embedding_pool: mean, corpus: datasets/corpus-a/rl_corpus.json }
  - { kind: transformer, name: tx_hard_shuf, run_name: rl_hard_shuf,   mode: symbol-shuffling,      ckpt_select: best_acc, embedding_pool: mean, corpus: datasets/corpus-a/rl_corpus.json }
  - { kind: human,       name: humans }
  - { kind: mpl,         name: mpl,    filters: { lesion: 'None', mode: Online, steps: '500000' } }
  - { kind: fleet,       name: fleet,  filters: { mode: Online, steps: '500000' } }

analyses:
  - kind: rule_acquisition
    pairs: all

  - kind: failure_modes
    features: [recursive, higher, conditional, arithmetic, mapping, filtering, indexing, unfolding, counting]
    pairs: [[tx_in_weight, humans], [tx_hard_shuf, humans], [tx_in_weight, tx_hard_shuf]]

  - kind: clustering
    methods: [tx_in_weight, tx_easy_shuf, tx_hard_shuf]
    reducer: [pca, tsne]
    cluster: kmeans
    k_search: [4, 5, 6, 7, 8, 9, 10]
    color_by: [cluster, recursive, mapping]
    replicates: false
    level: task

  - kind: error_similarity
