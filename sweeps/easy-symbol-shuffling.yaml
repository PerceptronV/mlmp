# wandb Bayesian sweep — easy-symbol-shuffling model, enum+rl corpus.
#
# Create the sweep (from the repo root on a login node):
#     wandb sweep sweeps/easy-symbol-shuffling.yaml
# That prints a SWEEP_ID like "entity/mlmp/abc123". Launch agents with:
#     SWEEP_ID=entity/mlmp/abc123 sbatch scripts/sweep_agent.slurm.sh
#
# Same optimization search space as the in-weight sweep; only `mode` differs.
# Curriculum knobs (--easy-shuffle-k-start/-end/-ramp-epochs) stay at their
# defaults here — add them to `parameters` if you later want to search them too.
# Pin the project explicitly — without it, `wandb sweep` auto-derives the project
# name from the program path (yielding e.g. "mlmp-scripts"). Entity is left unset
# so wandb uses your default.
project: mlmp

program: scripts/sweep_train.sh
command:
  - bash
  - ${program}
  - ${args}

method: bayes

metric:
  name: best_val_accuracy
  goal: maximize

# No early termination: every trial trains to full length so all runs are
# directly comparable for marginal hyperparameter analysis.

# 32 trials = 8 agents x COUNT=4 (see scripts/sweep_agent.slurm.sh).
run_cap: 32

parameters:
  mode:
    value: easy-symbol-shuffling
  epochs:           # fixed budget so every (non-terminated) run is comparable
    value: 80
  lr:
    distribution: log_uniform_values
    min: 0.0003
    max: 0.006
  weight-decay:
    values: [0.0, 0.01, 0.03, 0.1, 0.3]
  grad-clip:
    values: [0.5, 1.0, 2.0]
  batch-size:
    values: [64, 128, 256]
  lr-schedule:
    values: [cosine, constant]
